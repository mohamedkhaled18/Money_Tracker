<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="shortcut icon" href="https://tse2.mm.bing.net/th/id/OIP.ZCKaq8g834AzW2gE9MgihwHaHa?pid=Api&h=220&P=0"
        type="image/x-icon"> -->
    <title>Money Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="flex flex-col lg:flex-row min-h-screen">

    <!-- Account Info -->
    <section class="account-info flex-grow p-4 sm:p-6 lg:p-8"
        style="background-color: var(--bg-darkgray); color: var(--text-primary);">

        <h2 id="account-name" class="text-xl sm:text-2xl lg:text-3xl font-bold mb-2">
            🏠 Home
        </h2>
        <h1 class="text-xl mb-6" style="color: var(--accent-lime);">Total:
            <span id="total"></span> EGP
        </div>

        <!-- Summary Cards -->
        <div class="expense-income grid grid-cols-1 sm:grid-cols-2 gap-4 lg:gap-6 mb-6">
            <h1 class="p-6 rounded-lg shadow text-lg font-semibold"
                style="background-color: var(--income); color: var(--bg-deep);">
                Income: <span id="total-income"></span> EGP
            </h1>
            <h1 class="p-6 rounded-lg shadow text-lg font-semibold"
                style="background-color: var(--expense); color: var(--bg-deep);">
                Expenses: <span id="total-expense"></span> EGP
            </h1>
        </div>

        <!-- Transactions -->
        <h2 id="empty-transactions-warning" class="text-center font-bold text-base sm:text-lg">No Transactions Found
        </h2>
        <section class="transactions max-h-[340px] overflow-y-scroll overflow-x-auto">
            <h2 class="text-xl font-semibold underline mb-4" style="color: var(--accent-emerald);">Transactions</h2>
            <table id="transactions-table" class="w-full border-collapse shadow-lg">
                <thead style="background-color: var(--bg-charcoal); color: var(--accent-lime);">
                    <tr>
                        <th class="sm:p-3 p-3 text-left">Type</th>
                        <th class="sm:p-3 p-3 text-left">Amount</th>
                        <th class="sm:p-3 p-3 text-left">Category</th>
                        <th class="sm:p-3 p-3 text-left">Date</th>
                        <th class="sm:p-3 p-3 text-left">Notes</th>
                    </tr>
                </thead>
                <tbody id="transactions" class="overflow-x-scroll"></tbody>
            </table>
        </section>
    </section>

    <!-- Floating Add Transaction Button -->
    <button id="add_transaction_btn"
        class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 bg-[var(--accent-lime)] text-white text-[2rem] font-bold
        rounded-full w-12 h-12 sm:w-14 sm:h-14 text-xl sm:text-2xl shadow-lg hover:bg-[var(--accent-brightgreen)] cursor-pointer text-center">
        +
    </button>

    <section id="modals"></section>

    <!-- <section class="charts p-4">
        <h2 class="text-xl font-bold mb-4">Overview Chart</h2>
        <canvas id="overviewChart"></canvas>
    </section> -->

    
</body>
<!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
<script type="module" src="./JS/main.js"></script>
<!-- <script type="module" src="./JS/utility.js"></script> -->

</html>
