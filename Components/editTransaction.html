<!-- Add Account Modal -->
<div class="modal" id="addAccountModal">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title">Add New Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
      <!-- Body -->
      <div class="modal-body">
        <form id="addAccountForm">
          <div class="mb-3">
            <label for="accountName" class="form-label">Account Name</label>
            <input type="text" class="form-control" id="accountName" required>
          </div>
          <div class="mb-3">
            <label for="accountType" class="form-label">Account Type</label>
            <select class="form-select" id="accountType">
              <option>Checking</option>
              <option>Savings</option>
              <option>Credit Card</option>
              <option>Investment</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="initialBalance" class="form-label">Initial Balance</label>
            <input type="number" class="form-control" id="initialBalance" required>
          </div>
        </form>
      </div>
      
      <!-- Footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="addAccountForm" class="btn btn-success">Add Account</button>
      </div>
    </div>
  </div>
</div>
