<!-- Add Account Modal -->
<div class="fixed inset-0 flex items-center justify-center bg-black/70 bg-opacity-50 z-50" id="addAccountModal">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-md">

        <!-- Header -->
        <div class="flex justify-between items-center border-b px-4 py-2">
            <h2 class="text-lg font-semibold">Add New Account</h2>
            <button class="text-gray-500 hover:text-gray-700" onclick="closeModal('addAccountModal')">&times;</button>
        </div>

        <!-- Body -->
        <div class="p-4">
            <form id="addAccountForm" class="space-y-4">
                <div>
                    <label for="accountName" class="block text-sm font-medium">Account Name</label>
                    <input type="text" id="accountName"
                        class="mt-1 block w-full border rounded-md p-2 focus:ring focus:ring-green-300" required>
                </div>
                <div>
                    <label for="accountType" class="block text-sm font-medium">Account Type</label>
                    <select id="accountType"
                        class="mt-1 block w-full border rounded-md p-2 focus:ring focus:ring-green-300">
                        <option>Savings</option>
                        <option>Investment</option>
                    </select>
                </div>
                <div>
                    <label for="initialBalance" class="block text-sm font-medium">Initial Balance</label>
                    <input type="number" id="initialBalance"
                        class="mt-1 block w-full border rounded-md p-2 focus:ring focus:ring-green-300" required>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="flex justify-end space-x-2 border-t px-4 py-2">
            <button id="close_btn" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Cancel</button>
            <button id="add_btn" form="addAccountForm"
                class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Add Account</button>
        </div>
    </div>
</div>
